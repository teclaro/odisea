name: Actualizar datos del indice TACO

on:
  workflow_dispatch:
  schedule:
    # Dias habiles, 22:30 UTC (tras el cierre de Wall Street)
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generar data/taco.json
        run: python scripts/fetch_taco_data.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/taco.json
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos"
          else
            git commit -m "Actualiza datos del indice TACO"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
